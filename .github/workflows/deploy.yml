name: Deploy to VPS

on:
  push:
    branches:
      - main
      
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # Pindah ke direktori project di Server
          # Ganti direktori di bawah ini sesuai dengan lokasi project di server Anda
          cd /www/wwwrooot/jurnaltradingku.my.id

          # Ambil update terbaru dari GitHub
          git pull origin main

          # Install dependensi PHP terbaru
          composer install --no-interaction --prefer-dist --optimize-autoloader

          # Jalankan migrasi database
          php artisan migrate --force

          # Reset dan optimasi cache Laravel
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Jika Anda menggunakan npm/Vite untuk build aset UI, buka remark baris berikut:
          # npm install
          # npm run build
